<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Profile Viewer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:400px;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    margin-bottom:20px;
    color:#24292e;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    outline:none;
}

button{
    padding:10px 15px;
    border:none;
    background:#24292e;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0366d6;
}

.profile-card img{
    width:120px;
    border-radius:50%;
    margin-bottom:10px;
}

.profile-card h2{
    margin:10px 0;
}

.profile-card p{
    margin:5px 0;
}

.profile-card a{
    text-decoration:none;
    color:#0366d6;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>GitHub Profile Viewer</h1>

    <div class="search-box">
        <input type="text" id="username" placeholder="Enter GitHub Username">
        <button onclick="getProfile()">Search</button>
    </div>

    <div id="profile" class="profile-card"></div>
</div>

<script>
async function getProfile() {
    const username = document.getElementById("username").value.trim();
    const profile = document.getElementById("profile");

    if(username === ""){
        profile.innerHTML = "<p>Please enter a username.</p>";
        return;
    }

    try{
        const response = await fetch(
            `https://api.github.com/users/${username}`
        );

        const data = await response.json();

        if(data.message === "Not Found"){
            profile.innerHTML = "<p>User not found.</p>";
            return;
        }

        profile.innerHTML = `
            <img src="${data.avatar_url}" alt="Profile Image">
            <h2>${data.name || "No Name"}</h2>
            <p><strong>@${data.login}</strong></p>
            <p>${data.bio || "No Bio Available"}</p>
            <p>Followers: ${data.followers}</p>
            <p>Following: ${data.following}</p>
            <p>Public Repositories: ${data.public_repos}</p>
            <br>
            <a href="${data.html_url}" target="_blank">
                Visit GitHub Profile
            </a>
        `;
    }
    catch(error){
        profile.innerHTML = "<p>Error fetching profile data.</p>";
    }
}
</script>

</body>
</html>
